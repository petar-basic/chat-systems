# =============================================================================
# Chat Systems — Dev Override (infra only)
# =============================================================================
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# This disables api, realtime, and frontend so you can run them locally on
# the host (cargo run -p chat-api, cargo run -p chat-realtime, npm run dev).
# =============================================================================

services:
  api:
    profiles: ["disabled"]
  realtime:
    profiles: ["disabled"]
  frontend:
    profiles: ["disabled"]
