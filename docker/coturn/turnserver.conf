# =============================================================================
# Chat Systems — coturn (TURN/STUN) for huddle WebRTC mesh.
# =============================================================================
# The shared secret and realm are injected on the command line by the compose
# `coturn` service so they are never baked into the image. See the `coturn`
# service in docker-compose.yml and the TURN section of .env.example.
#
# The API mints short-lived credentials that coturn validates against the same
# secret (TURN REST API: username = "<expiry-unix>:<user-id>",
# credential = base64(hmac_sha1(secret, username))).
# =============================================================================

listening-port=3478
tls-listening-port=5349

fingerprint
use-auth-secret

# Bound the relay port range so it can be firewalled / port-forwarded explicitly.
min-port=49160
max-port=49200

# Refuse relaying to private, loopback, and link-local ranges so the TURN server
# cannot be abused to reach internal services (SSRF via relay).
no-multicast-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=::1
denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff
denied-peer-ip=fe80::-febf:ffff:ffff:ffff:ffff:ffff:ffff:ffff

# No admin telnet/CLI surface.
no-cli

# For production turns:// (TLS), mount a cert/key and uncomment:
# cert=/etc/coturn/certs/turn.crt
# pkey=/etc/coturn/certs/turn.key
