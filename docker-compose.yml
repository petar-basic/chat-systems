# =============================================================================
# Chat Systems — Docker Compose (base)
# =============================================================================
# SECRETS: this file reads required secrets from the environment / a .env file.
# Before running, copy the template and fill in strong values:
#   cp .env.example .env
#   # then set JWT_SECRET, ADMIN_PASSWORD, POSTGRES_PASSWORD, etc.
# Docker Compose auto-loads a .env file in this directory. The `${VAR:?msg}`
# syntax below fails fast with a clear error if a required var is missing.
# =============================================================================
# Usage:
#   docker compose up -d --build                       — infra + api + realtime
#   docker compose --profile frontend up -d --build    — also the dockerized SPA
#                                                         (app at http://localhost:8080)
#   docker compose --profile s3 up -d                  — also MinIO object storage
#   docker compose down                                — stop all services
#   docker compose down -v                             — stop and wipe all data
#
# Local backend dev (run api/realtime/SPA on the host instead):
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# PRODUCTION (TLS, restart policies, resource limits, no raw ports):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#     --profile frontend --profile s3 up -d --build
#   # serves https://$DOMAIN via Caddy (auto Let's Encrypt). See README.
# =============================================================================

services:
  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: chatsystems
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (see .env.example)}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat -d chatsystems"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Loopback-only: reachable for host-run dev binaries, never exposed remotely.
    ports:
      - "127.0.0.1:5433:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "127.0.0.1:6380:6379"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    profiles: ["s3"]
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set for the s3 profile (see .env.example)}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"

  minio-init:
    image: minio/mc:RELEASE.2025-04-08T15-39-49Z
    profiles: ["s3"]
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set for the s3 profile (see .env.example)}
      BUCKET_NAME: ${S3_BUCKET:-chatsystems}
    entrypoint: /bin/sh
    command: /init.sh
    volumes:
      - ./docker/minio-init.sh:/init.sh:ro
    restart: "no"

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    platform: linux/amd64
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"

  # ── Backend Services ─────────────────────────────────────────────────────

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SERVICE: chat-api
      PORT: "3000"
      DATABASE_URL: postgres://chat:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (see .env.example)}@postgres:5432/chatsystems
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set (see .env.example)}
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_FROM_ADDRESS: noreply@dev.local
      SMTP_FROM_NAME: Chat Systems
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@dev.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set (see .env.example)}
      INSTANCE_NAME: ${INSTANCE_NAME:-Chat Systems}
      # PUBLIC_URL is used for invite/reset email links AND decides whether auth
      # cookies are marked Secure (https → Secure). In production set this to your
      # public https domain (the prod override does this from $DOMAIN).
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8080}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://localhost:3001}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      LOCAL_STORAGE_PATH: /data/files
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-chatsystems}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - file_data:/data/files
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Loopback-only host port so a host-run Vite dev server (npm run dev) can proxy
    # /api here. In full-docker mode the SPA reaches it via nginx instead.
    ports:
      - "127.0.0.1:3000:3000"

  realtime:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SERVICE: chat-realtime
      PORT: "3004"
      DATABASE_URL: postgres://chat:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (see .env.example)}@postgres:5432/chatsystems
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set (see .env.example)}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://localhost:3001}
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Loopback-only host port so a host-run Vite dev server can proxy /ws here.
    # In full-docker mode the SPA reaches it via nginx instead.
    ports:
      - "127.0.0.1:3004:3004"

  # ── Frontend (React → nginx) ──────────────────────────────────────────────

  frontend:
    profiles: ["frontend"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
      - realtime
    # nginx serves the SPA and proxies /api + /ws internally.
    # Loopback-only host port for local full-docker demos: http://localhost:8080
    # In production, Caddy fronts this service on 443 over the docker network.
    ports:
      - "127.0.0.1:8080:8080"

volumes:
  postgres_data:
  redis_data:
  minio_data:
  file_data:
