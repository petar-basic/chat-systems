name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgres://chat:devpassword@localhost:5432/chatsystems
      REDIS_URL: redis://localhost:6379
      # CI-only secret; >=32 chars so JWT (HS256) key validation passes.
      JWT_SECRET: ci-test-jwt-secret-please-change-0123456789
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: chat
          POSTGRES_PASSWORD: devpassword
          POSTGRES_DB: chatsystems
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chat -d chatsystems"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      # Pinned (not @stable) so clippy lints are reproducible: a new stable
      # release must not turn CI red on lints that can't be reproduced locally.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.93.0
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo build
        run: cargo build --workspace

      - name: cargo test
        run: cargo test --workspace

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: cargo audit
        run: cargo audit

  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc -b

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test
